{{ define "main" }}
  <header>
    <h1 class="mt-0 text-4xl font-extrabold text-neutral-900 dark:text-neutral">{{ .Title }}</h1>
  </header>

  {{ with .Content }}
    <section
      class="prose mt-6 max-w-full rounded-xl border border-neutral-200 bg-neutral-50 p-6 dark:prose-invert dark:border-neutral-700 dark:bg-neutral-800/40"
    >
      {{ . | emojify }}
    </section>
  {{ end }}

  {{ if .Data.Pages }}
    <section class="mt-10 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
      {{ range (.Paginate .Pages).Pages }}
        {{ partial "article-card.html" . }}
      {{ end }}
    </section>
    {{ partial "pagination.html" . }}
  {{ else }}
    <section class="prose mt-10 dark:prose-invert">
      <p class="border-t py-8">
        <em>{{ i18n "list.no_articles" | emojify }}</em>
      </p>
    </section>
  {{ end }}
{{ end }}
