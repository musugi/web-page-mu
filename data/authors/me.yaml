bio: |
  Hiromu Sugiyama is a researcher at Waseda University, Tokyo. He holds an M.A. in Public Policy
  with a Certificate in Research Methods (MACRM) from the University of Chicago and a B.S. in
  Human-Centered Design Engineering from the University of Washington. His research focuses on
  conjoint experiments, bureaucratic accountability, voting systems, and multiple equilibria in
  political institutions.

